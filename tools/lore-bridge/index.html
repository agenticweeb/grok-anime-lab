<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lore Bridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Abril+Fatface&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --px: 0px;
            --py: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .theme-lom {
            --bg-color: #0d0812;
            --surface: #1a1124;
            --border: #3d2b4f;
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --text-main: #d4c5d9;
            --text-muted: #9a8c9e;
            --font-heading: 'Cormorant Garamond', ui-serif, Georgia, serif;
            --font-body: ui-serif, Georgia, 'Times New Roman', serif;
            --portal-bg: #1a0b2e;
            --particle-color: rgba(138, 43, 226, 0.6);
            --menu-accent: #C5A059;
        }

        .theme-mt {
            --bg-color: #08120a;
            --surface: #112415;
            --border: #2b4f35;
            --primary: #32cd32;
            --primary-glow: rgba(50, 205, 50, 0.4);
            --text-main: #c5d9c7;
            --text-muted: #8c9e8e;
            --font-heading: 'Abril Fatface', ui-sans-serif, system-ui, sans-serif;
            --font-body: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --portal-bg: #0b2e1a;
            --particle-color: rgba(50, 205, 50, 0.6);
            --menu-accent: #50C878;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            transition: background-color 0.5s ease, color 0.5s ease;
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
            pointer-events: none;
        }

        /* Top Bar */
        .top-bar {
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .toggle-group {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px;
            gap: 4px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.85rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .menu-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
            transform: scale(1.05);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px var(--primary-glow);
        }

        .msg-ai {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .msg-user p, .msg-ai p {
            padding: 12px 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .typing-indicator span {
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            position: relative;
            z-index: 100;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 8px;
            scrollbar-width: none;
        }

        .suggestions::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .chip:hover {
            border-color: var(--primary);
            background: rgba(138, 43, 226, 0.1);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 24px;
            font-family: var(--font-body);
            font-size: 16px;
            outline: none;
        }

        .input-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-size: 1rem;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* Side Menu */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-right: 2px solid var(--menu-accent);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .side-menu.active {
            transform: translateX(0);
        }

        .menu-header {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--menu-accent);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .menu-link {
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            cursor: pointer;
        }

        .menu-link:hover {
            border-color: var(--menu-accent);
            background: rgba(0, 0, 0, 0.5);
            transform: translateX(4px);
        }

        .menu-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Parallax & Particles */
        .parallax-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .parallax-layer {
            position: absolute;
            inset: -50px;
            transform: translate3d(var(--px), var(--py), 0);
            transition: transform 0.2s ease-out, opacity 0.5s ease;
            opacity: 0;
        }

        .theme-lom .lom-bg { opacity: 1; }
        .theme-mt .mt-bg { opacity: 1; }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--particle-color);
            animation: float-up linear infinite;
            opacity: 0;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        #portal-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            background: var(--portal-bg);
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #portal-overlay.active {
            clip-path: circle(150% at 50% 50%);
        }

        .theme-lom::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 9998;
            mix-blend-mode: overlay;
        }

        .theme-mt::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
        }
    </style>
</head>
<body class="theme-lom">
    <div id="portal-overlay"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="toggle-group" id="universe-toggle">
            <button class="toggle-btn active" data-universe="lom">🃏 LoM</button>
            <button class="toggle-btn" data-universe="mt">🗡️ MT</button>
        </div>
        <div class="toggle-group" id="audience-toggle">
            <button class="toggle-btn active" data-audience="watcher">👁️ Watcher</button>
            <button class="toggle-btn" data-audience="reader">📖 Reader</button>
        </div>
        <button class="menu-btn" id="menu-toggle">🃏</button>
    </div>

    <!-- Parallax & Particles -->
    <div class="parallax-container">
        <svg class="parallax-layer lom-bg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMax slice">
            <path d="M450,1000 L450,600 L400,550 L400,400 L480,200 L500,100 L520,200 L600,400 L600,550 L550,600 L550,1000 Z" fill="rgba(138, 43, 226, 0.05)" />
            <circle cx="500" cy="350" r="40" fill="none" stroke="rgba(138, 43, 226, 0.1)" stroke-width="2" />
        </svg>
        <svg class="parallax-layer mt-bg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMax slice">
            <path d="M0,1000 L200,700 L300,850 L500,500 L700,800 L800,650 L1000,1000 Z" fill="rgba(50, 205, 50, 0.05)" />
            <circle cx="500" cy="400" r="150" fill="none" stroke="rgba(50, 205, 50, 0.08)" stroke-width="2" stroke-dasharray="10 5" />
        </svg>
    </div>
    <div class="particles-container" id="particles"></div>

    <!-- Chat Area -->
    <div class="chat-container" id="chat-container">
        <div class="msg-ai" style="max-width: 95%; width: 95%;">
            <p>Hey! Ask me anything about the lore.</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="suggestions" id="suggestions">
            <button class="chip">Who is The Fool?</button>
            <button class="chip">Explain the Pathways</button>
            <button class="chip">Mystery of the Gray Fog</button>
        </div>
        <form class="input-row" id="chat-form">
            <input type="text" id="user-input" placeholder="Ask the Oracle..." autocomplete="off" />
            <button type="submit" class="send-btn">Send</button>
        </form>
    </div>

    <!-- Side Menu Overlay -->
    <div class="menu-overlay" id="menu-overlay"></div>

    <!-- Side Menu -->
    <div class="side-menu" id="side-menu">
        <div class="menu-header" id="menu-header">The Gray Fog</div>
        <div class="menu-links">
            <a href="#" class="menu-link" onclick="showAbout(); return false;">About the Oracle</a>
            <a href="#" class="menu-link" id="github-link" target="_blank">View the Source Code</a>
            <a href="#" class="menu-link" id="support-link" target="_blank">Offer a Sacrifice</a>
            <a href="mailto:angazadesk@zohomail.com?subject=Lore Bridge Feedback" class="menu-link">Report an Anomaly</a>
        </div>
        <div class="menu-footer">Built with @grok</div>
    </div>

    <script type="module">
        import { siteConfig } from './config.js';

        let currentUniverse = 'lom';
        let currentAudience = 'watcher';
        let isGenerating = false;

        window.siteConfig = siteConfig;

        function applyBackground(series) {
            if (!window.siteConfig) return;
            const bg = window.siteConfig[series]?.backgroundImage;
            if (bg) {
                document.body.style.backgroundImage = `url('${bg}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';
            }
        }

        function switchUniverse(newUniverse) {
            if (newUniverse === currentUniverse) return;
            
            const portal = document.getElementById('portal-overlay');
            const body = document.body;
            
            portal.classList.add('active');
            
            setTimeout(() => {
                body.classList.remove('theme-lom', 'theme-mt');
                body.classList.add(`theme-${newUniverse}`);
                currentUniverse = newUniverse;
                updateAllUI();
                generateParticles();
                applyBackground(newUniverse);
            }, 400);
            
            setTimeout(() => {
                portal.classList.remove('active');
            }, 800);
        }

        function updateAllUI() {
            const config = siteConfig[currentUniverse];
            const modeConfig = config[currentAudience];
            
            const menuBtn = document.getElementById('menu-toggle');
            menuBtn.textContent = currentUniverse === 'lom' ? '🃏' : '🗡️';
            
            const menuHeader = document.getElementById('menu-header');
            menuHeader.textContent = currentUniverse === 'lom' ? 'The Gray Fog' : 'The Adventurer\'s Guild';
            
            const supportLink = document.getElementById('support-link');
            supportLink.textContent = currentUniverse === 'lom' ? 'Offer a Sacrifice' : 'Buy a Potion';
            supportLink.href = siteConfig.personal.paymentMethods.buyMeACoffee || '#';
            
            document.getElementById('github-link').href = siteConfig.personal.github || '#';
            
            const suggestionsContainer = document.getElementById('suggestions');
            suggestionsContainer.innerHTML = '';
            modeConfig.suggestions.forEach(suggestion => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.textContent = suggestion;
                chip.onclick = () => {
                    document.getElementById('user-input').value = suggestion;
                    document.getElementById('chat-form').dispatchEvent(new Event('submit'));
                };
                suggestionsContainer.appendChild(chip);
            });
        }

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            document.documentElement.style.setProperty('--px', `${x}px`);
            document.documentElement.style.setProperty('--py', `${y}px`);
        });

        function generateParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${15 + Math.random() * 25}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.width = p.style.height = `${2 + Math.random() * 4}px`;
                container.appendChild(p);
            }
        }

        document.querySelectorAll('#universe-toggle .toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#universe-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchUniverse(btn.dataset.universe);
            });
        });

        document.querySelectorAll('#audience-toggle .toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#audience-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentAudience = btn.dataset.audience;
                updateAllUI();
            });
        });

        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        const sideMenu = document.getElementById('side-menu');

        menuToggle.addEventListener('click', () => {
            menuOverlay.classList.add('active');
            sideMenu.classList.add('active');
        });

        menuOverlay.addEventListener('click', () => {
            menuOverlay.classList.remove('active');
            sideMenu.classList.remove('active');
        });

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            if(container) container.scrollTop = container.scrollHeight;
        }

        function formatText(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--menu-accent);">$1</strong>');
        }

        async function handleSend(e) {
            e.preventDefault();
            if (isGenerating) return;
            
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            isGenerating = true;
            input.value = '';
            
            const chatContainer = document.getElementById('chat-container');
            
            const userDiv = document.createElement('div');
            userDiv.className = 'msg-user';
            userDiv.style.maxWidth = '90%';
            userDiv.style.width = '90%';
            userDiv.innerHTML = `<p>${msg.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>`;
            chatContainer.appendChild(userDiv);
            
            const aiId = 'msg-' + Date.now();
            const aiDiv = document.createElement('div');
            aiDiv.id = aiId;
            aiDiv.className = 'msg-ai';
            aiDiv.style.maxWidth = '95%';
            aiDiv.style.width = '95%';
            aiDiv.innerHTML = `
                <p>
                    <div class="typing-indicator" style="display: flex; gap: 4px;">
                        <span style="width: 8px; height: 8px; background: var(--menu-accent); border-radius: 50%; display: inline-block;"></span>
                        <span style="width: 8px; height: 8px; background: var(--menu-accent); border-radius: 50%; display: inline-block;"></span>
                        <span style="width: 8px; height: 8px; background: var(--menu-accent); border-radius: 50%; display: inline-block;"></span>
                    </div>
                </p>`;
            chatContainer.appendChild(aiDiv);
            scrollToBottom();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg, 
                        series: currentUniverse, 
                        audience: currentAudience 
                    })
                });

                if (!res.ok) throw new Error('API request failed');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let aiResponse = '';
                let isFirstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

                    for (const line of lines) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(data);
                            aiResponse += parsed.content;
                            
                            const currentAiDiv = document.getElementById(aiId);
                            if (currentAiDiv) {
                                if (isFirstChunk) {
                                    currentAiDiv.innerHTML = `<p style="white-space: pre-wrap;">${formatText(aiResponse)}</p>`;
                                    isFirstChunk = false;
                                } else {
                                    currentAiDiv.querySelector('p').innerHTML = formatText(aiResponse);
                                }
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            } catch (err) {
                const currentAiDiv = document.getElementById(aiId);
                if(currentAiDiv) {
                    currentAiDiv.innerHTML = `<p style="color: #ff6b6b;">Connection lost or API limit hit. Try again in a few seconds.</p>`;
                }
            }

            isGenerating = false;
        }

        document.getElementById('chat-form').addEventListener('submit', handleSend);

        window.showAbout = function() {
            alert('About the Oracle\n\nLore Bridge is an AI-powered companion for fans of Lord of the Mysteries and Mushoku Tensei.');
            menuOverlay.classList.remove('active');
            sideMenu.classList.remove('active');
        };

        generateParticles();
        updateAllUI();
        applyBackground('lom');
    </script>
</body>
</html>
