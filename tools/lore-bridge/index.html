<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lore Bridge</title>
    
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Abril+Fatface&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           NATIVE MOBILE CHAT APP - STRICT MOBILE FIRST
           ========================================= */
        :root {
            --px: 0px;
            --py: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100dvh;
            overflow: hidden;
            width: 100%;
            max-width: 100vw;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* THEMES */
        .theme-lom {
            --bg-color: #0d0812;
            --surface: #1a1124;
            --border: #3d2b4f;
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --text-main: #d4c5d9;
            --text-muted: #9a8c9e;
            --font-heading: 'Cormorant Garamond', ui-serif, Georgia, serif;
            --portal-bg: #1a0b2e;
            --particle-color: rgba(138, 43, 226, 0.6);
        }

        .theme-mt {
            --bg-color: #08120a;
            --surface: #112415;
            --border: #2b4f35;
            --primary: #32cd32;
            --primary-glow: rgba(50, 205, 50, 0.4);
            --text-main: #c5d9c7;
            --text-muted: #8c9e8e;
            --font-heading: 'Abril Fatface', ui-sans-serif, system-ui, sans-serif;
            --portal-bg: #0b2e1a;
            --particle-color: rgba(50, 205, 50, 0.6);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body, ui-serif, Georgia, 'Times New Roman', serif);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        h1, h2, h3, .oracle-name {
            font-family: var(--font-heading);
        }

        /* 4K Background Images */
        body {
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
            pointer-events: none;
        }

        /* TOP BAR - Native Glassmorphism */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .universe-pills {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 9999px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .universe-pill {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
        }

        .universe-pill.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .menu-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 9999px;
            transition: all 0.2s ease;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* STATUS BAR */
        .status-bar {
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* CHAT AREA - Takes all remaining space */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .oracle-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .oracle-avatar {
            width: 42px;
            height: 42px;
            background: var(--surface);
            border: 2px solid var(--primary);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            -webkit-overflow-scrolling: touch;
        }

        /* BUBBLE STYLES - Mobile Optimized */
        .message {
            display: flex;
            max-width: 100%;
        }

        .msg-user {
            justify-content: flex-end;
        }

        .msg-ai {
            justify-content: flex-start;
        }

        .chat-bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 85%;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .msg-user .chat-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .msg-ai .chat-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        /* SUGGESTION CHIPS - Horizontal Scroll */
        .suggestions {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .suggestions::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .theme-lom .chip:hover {
            border-color: var(--primary);
            text-shadow: 0 0 8px var(--primary);
        }

        .theme-mt .chip:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        /* INPUT AREA - Sticky Bottom */
        .input-area {
            padding: 12px 16px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 9999px;
            font-size: 16px; /* Prevents iOS zoom */
            outline: none;
        }

        .input-row input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 22px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95rem;
            height: 48px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* SLIDE-OUT MENU */
        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            height: 100dvh;
            width: 280px;
            background: rgba(15, 10, 25, 0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .side-menu.open {
            transform: translateX(0);
        }

        .theme-mt .side-menu {
            background: rgba(10, 25, 15, 0.95);
        }

        .menu-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .menu-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
        }

        .menu-content {
            padding: 16px 20px;
            flex: 1;
            overflow-y: auto;
        }

        .menu-link {
            display: block;
            padding: 14px 0;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            transition: color 0.2s ease;
        }

        .menu-link:last-child {
            border-bottom: none;
        }

        .menu-link:hover {
            color: var(--primary);
        }

        .menu-footer {
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* Portal Overlay */
        #portal-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            background: var(--portal-bg);
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.75s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #portal-overlay.active {
            clip-path: circle(150% at 50% 50%);
        }

        /* Particles */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--particle-color);
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100dvh) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-20dvh) translateX(40px); opacity: 0; }
        }

        /* Responsive safety */
        @media (max-width: 480px) {
            .chat-bubble {
                max-width: 92% !important;
                font-size: 0.92rem;
            }
        }
    </style>
</head>
<body class="theme-lom">

    <!-- Portal Overlay -->
    <div id="portal-overlay"></div>

    <!-- TOP BAR -->
    <header class="top-bar">
        <!-- Left: Universe Toggles -->
        <div class="universe-pills" id="universe-toggle">
            <button class="universe-pill active" data-universe="lom">🃏 LoM</button>
            <button class="universe-pill" data-universe="mt">🗡️ MT</button>
        </div>

        <!-- Right: Menu Button -->
        <button id="menu-btn" class="menu-btn">🃏</button>
    </header>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <span id="status-text">Mode: LoM Watcher • Locked to end of Vol 1 • No Spoilers</span>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
        <!-- Oracle Header -->
        <div class="oracle-header">
            <div class="oracle-avatar" id="oracle-icon">🃏</div>
            <div>
                <div class="oracle-name" id="oracle-name">The Gray Fog Oracle</div>
                <div class="text-xs text-white/60" id="oracle-status">Spoiler-free • Up to current anime</div>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages">
            <!-- Messages populated by existing JS -->
        </div>

        <!-- Suggestion Chips (Horizontal Scroll) -->
        <div class="suggestions" id="suggestions">
            <!-- Populated by existing JS -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="user-input" placeholder="Ask the Oracle..." />
                <button class="send-btn" id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- SLIDE-OUT DIEGETIC MENU -->
    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <div id="menu-title" class="menu-title">The Gray Fog</div>
        </div>
        <div class="menu-content">
            <a href="#" onclick="showPage('about'); closeMenu();" class="menu-link">About the Oracle</a>
            <a href="https://github.com/yourusername/lore-bridge" target="_blank" class="menu-link">View the Source Code</a>
            <a href="https://www.buymeacoffee.com/yourusername" target="_blank" class="menu-link">Offer a Sacrifice / Buy a Potion</a>
            <a href="mailto:angazadesk@zohomail.com?subject=Lore Bridge Feedback" class="menu-link">Report an Anomaly / Suggest a Quest</a>
        </div>
        <div class="menu-footer">
            Built with <span style="color:#C5A059">@grok</span>
        </div>
    </div>

    <!-- Menu Overlay -->
    <div id="menu-overlay" class="menu-overlay" onclick="closeMenu()"></div>

    <!-- ABOUT PAGE (kept for existing JS) -->
    <div id="about-page" class="page" style="display:none; position:fixed; inset:0; z-index:10001; background:var(--bg-color); overflow-y:auto; padding-top:60px;">
        <div class="about-container" style="max-width:900px; margin:0 auto; padding:20px;">
            <!-- Content populated by existing JS -->
        </div>
    </div>

    <script type="module">
        // =========================================
        // EXISTING SCRIPT LOGIC - KEPT EXACTLY AS PROVIDED
        // =========================================
        import { siteConfig } from './config.js';

        let currentUniverse = 'lom';
        let currentAudience = 'watcher';
        let isGenerating = false;

        window.siteConfig = siteConfig;

        function applyBackground(series) {
            if (!window.siteConfig) return;
            const bg = window.siteConfig[series]?.backgroundImage;
            if (bg) {
                document.body.style.backgroundImage = `url('${bg}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';
            }
        }

        function applyBackgrounds() {
            if (window.siteConfig) {
                const lomBg = window.siteConfig.lom.backgroundImage || (window.siteConfig.lom.images && window.siteConfig.lom.images.background);
                const mtBg = window.siteConfig.mt.backgroundImage || (window.siteConfig.mt.images && window.siteConfig.mt.images.background);
                
                if (currentUniverse === 'lom' && lomBg) {
                    document.body.style.backgroundImage = `url(${lomBg})`;
                } else if (currentUniverse === 'mt' && mtBg) {
                    document.body.style.backgroundImage = `url(${mtBg})`;
                } else {
                    document.body.style.backgroundImage = 'none';
                }
            }
        }

        function switchUniverse(newUniverse) {
            applyBackground(newUniverse);
            if (newUniverse === currentUniverse) return;
            
            const portal = document.getElementById('portal-overlay');
            const body = document.body;
            
            portal.classList.add('active');
            
            setTimeout(() => {
                body.classList.remove('theme-lom', 'theme-mt');
                body.classList.add(`theme-${newUniverse}`);
                currentUniverse = newUniverse;
                updateAllUI();
                generateParticles();
                applyBackgrounds();
                updateMenuIcon();
            }, 400);
            
            setTimeout(() => {
                portal.classList.remove('active');
            }, 800);
        }

        function updateAllUI() {
            const config = siteConfig[currentUniverse];
            const modeConfig = config[currentAudience];
            
            document.getElementById('oracle-name').textContent = config.oracleName;
            document.getElementById('oracle-icon').textContent = config.oracleIcon;
            document.getElementById('oracle-status').textContent = modeConfig.oracleStatus;
            document.getElementById('welcome-message').textContent = modeConfig.welcomeMessage;
            document.getElementById('status-text').textContent = modeConfig.modeStatus;
            document.getElementById('user-input').placeholder = modeConfig.inputPlaceholder;
            
            const suggestionsContainer = document.getElementById('suggestions');
            suggestionsContainer.innerHTML = '';
            modeConfig.suggestions.forEach(suggestion => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.textContent = suggestion;
                chip.onclick = () => {
                    document.getElementById('user-input').value = suggestion;
                    sendMessage();
                };
                suggestionsContainer.appendChild(chip);
            });
            
            const tipBtn = document.getElementById('tip-jar-btn');
            if (tipBtn) {
                tipBtn.querySelector('.icon').textContent = config.diegeticText.buttonIcon;
                tipBtn.querySelector('.text').textContent = config.diegeticText.buttonText;
            }
            
            document.getElementById('modal-title').textContent = config.diegeticText.modalTitle;
            document.getElementById('modal-description').textContent = config.diegeticText.modalDescription;
            
            updateMenuIcon();
        }

        function updateMenuIcon() {
            const menuBtn = document.getElementById('menu-btn');
            if (!menuBtn) return;
            
            if (currentUniverse === 'lom') {
                menuBtn.innerHTML = '🃏';
            } else {
                menuBtn.innerHTML = '🗡️';
            }
        }

        // Parallax
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            document.documentElement.style.setProperty('--px', `${x}px`);
            document.documentElement.style.setProperty('--py', `${y}px`);
        });

        function generateParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${14 + Math.random() * 22}s`;
                p.style.animationDelay = `${Math.random() * 8}s`;
                p.style.width = p.style.height = `${2 + Math.random() * 3.5}px`;
                container.appendChild(p);
            }
        }

        window.showPage = function(pageName) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            const target = document.getElementById(`${pageName}-page`);
            if (target) target.classList.add('active');
            
            if (pageName === 'about') {
                loadAboutPage();
            }
        };

        function loadAboutPage() {
            const about = siteConfig.about;
            const personal = siteConfig.personal;
            
            const container = document.querySelector('#about-page .about-container');
            if (!container) return;
            
            container.innerHTML = `
                <div style="text-align:center; margin-bottom:40px;">
                    <h1 style="font-size:2.4rem; color:var(--primary); margin-bottom:16px;">${about.title}</h1>
                    <p style="font-size:1.1rem; color:var(--text-muted); max-width:680px; margin:0 auto; line-height:1.7;">${about.description}</p>
                </div>
                
                <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; margin-bottom:24px;">
                    <h2 style="color:var(--primary); margin-bottom:18px; font-size:1.5rem;">✨ Features</h2>
                    <ul style="list-style:none; display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:12px;">
                        ${about.features.map(f => `<li style="padding:12px 16px; background:var(--bg-color); border-radius:8px; border-left:3px solid var(--primary);">${f}</li>`).join('')}
                    </ul>
                </div>
                
                <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; margin-bottom:24px;">
                    <h2 style="color:var(--primary); margin-bottom:18px; font-size:1.5rem;">🛠️ Built With</h2>
                    <ul style="list-style:none; display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:10px;">
                        ${about.techStack.map(t => `<li style="padding:10px 14px; background:var(--bg-color); border-radius:8px;">${t}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // Menu Functions
        function openMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            menu.classList.add('open');
            overlay.classList.add('open');
        }

        function closeMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            menu.classList.remove('open');
            overlay.classList.remove('open');
        }

        // Menu button listener
        function initMenu() {
            const menuBtn = document.getElementById('menu-btn');
            if (menuBtn) {
                menuBtn.addEventListener('click', openMenu);
            }
            
            // Update icon on theme change
            const originalUpdateAllUI = window.updateAllUI || updateAllUI;
            window.updateAllUI = function() {
                originalUpdateAllUI();
                const menuBtnEl = document.getElementById('menu-btn');
                if (menuBtnEl) {
                    menuBtnEl.innerHTML = currentUniverse === 'lom' ? '🃏' : '🗡️';
                }
            };
        }

        // Existing chat logic (kept exactly)
        async function sendMessage(e) {
            if (e) e.preventDefault();
            if (isGenerating) return;
            
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            isGenerating = true;
            input.value = '';
            
            const messagesContainer = document.getElementById('chat-messages');
            
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerHTML = `<div class="chat-bubble"><p class="text-sm leading-relaxed">${msg.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p></div>`;
            messagesContainer.appendChild(userDiv);
            
            const aiId = 'msg-' + Date.now();
            const aiDiv = document.createElement('div');
            aiDiv.id = aiId;
            aiDiv.className = 'message oracle-msg';
            aiDiv.innerHTML = `
                <div class="chat-bubble">
                    <div class="typing-indicator flex gap-1 text-[#C5A059]">
                        <span class="w-2 h-2 bg-[#C5A059] rounded-full inline-block"></span>
                        <span class="w-2 h-2 bg-[#C5A059] rounded-full inline-block"></span>
                        <span class="w-2 h-2 bg-[#C5A059] rounded-full inline-block"></span>
                    </div>
                </div>`;
            messagesContainer.appendChild(aiDiv);
            scrollToBottom();

            const audienceToggle = document.getElementById('audience-toggle');
            const currentAudienceMode = (audienceToggle && audienceToggle.querySelector('.active')?.dataset.audience === 'reader') ? 'reader' : 'watcher';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg, 
                        series: currentUniverse, 
                        audience: currentAudienceMode 
                    })
                });

                if (!res.ok) throw new Error('API request failed');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let aiResponse = '';
                let isFirstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

                    for (const line of lines) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(data);
                            aiResponse += parsed.content;
                            
                            const currentAiDiv = document.getElementById(aiId);
                            if (currentAiDiv) {
                                const bubble = currentAiDiv.querySelector('.chat-bubble');
                                if (isFirstChunk) {
                                    bubble.innerHTML = `<p class="text-sm leading-relaxed whitespace-pre-wrap">${formatText(aiResponse)}</p>`;
                                    isFirstChunk = false;
                                } else {
                                    bubble.querySelector('p').innerHTML = formatText(aiResponse);
                                }
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            } catch (err) {
                const currentAiDiv = document.getElementById(aiId);
                if(currentAiDiv) {
                    currentAiDiv.querySelector('.chat-bubble').innerHTML = `<p class="text-sm text-red-400">Connection lost or API limit hit. Try again in a few seconds.</p>`;
                }
            }

            isGenerating = false;
        }

        function formatText(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<strong class="text-[#C5A059]">$1</strong>');
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            if(container) container.scrollTop = container.scrollHeight;
        }

        // Event Listeners
        function initEventListeners() {
            // Universe Toggle
            document.querySelectorAll('#universe-toggle .universe-pill').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#universe-toggle .universe-pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switchUniverse(btn.dataset.universe);
                });
            });

            // Audience Toggle (if exists in original)
            const audienceGroup = document.getElementById('audience-toggle');
            if (audienceGroup) {
                audienceGroup.querySelectorAll('.toggle-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        audienceGroup.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentAudience = btn.dataset.audience;
                        updateAllUI();
                    });
                });
            }

            // Send button & input
            const sendBtn = document.getElementById('send-btn');
            const userInput = document.getElementById('user-input');
            
            if (sendBtn) sendBtn.addEventListener('click', sendMessage);
            if (userInput) {
                userInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage(e);
                });
            }

            // Initialize menu
            initMenu();

            // Close menu on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const menu = document.getElementById('side-menu');
                    if (menu && menu.classList.contains('open')) {
                        closeMenu();
                    }
                }
            });
        }

        // Initialize everything
        function initializeApp() {
            generateParticles();
            updateAllUI();
            applyBackgrounds();
            applyBackground('lom');
            initEventListeners();
            
            // Set initial menu icon
            const menuBtn = document.getElementById('menu-btn');
            if (menuBtn) menuBtn.innerHTML = '🃏';
            
            // Make sure chat starts scrolled to bottom
            setTimeout(scrollToBottom, 300);
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
