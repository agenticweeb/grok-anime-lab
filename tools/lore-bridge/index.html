<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Lore Bridge — AI Lore Companion for LoM &amp; Mushoku Tensei</title>
    <meta name="description" content="Spoiler-free AI lore chat for Lord of the Mysteries and Mushoku Tensei. Switch between anime watcher and novel reader modes.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/public/images/lom-bg.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lore-bridge.vercel.app/">
    <meta property="og:title" content="Lore Bridge — AI Lore Companion">
    <meta property="og:description" content="Spoiler-free AI lore chat for Lord of the Mysteries and Mushoku Tensei. Built by @agenticweeb.">
    <meta property="og:image" content="https://lore-bridge.vercel.app/public/images/lom-bg.jpg?v=2">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@agenticweeb">
    <meta name="twitter:title" content="Lore Bridge — AI Lore Companion">
    <meta name="twitter:description" content="Spoiler-free AI lore chat for Lord of the Mysteries and Mushoku Tensei.">
    <meta name="twitter:image" content="https://lore-bridge.vercel.app/public/images/lom-bg.jpg?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Abril+Fatface&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --px: 0px;
            --py: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .theme-lom {
            --bg-color: #0d0812;
            --surface: #1a1124;
            --border: #3d2b4f;
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --text-main: #d4c5d9;
            --text-muted: #9a8c9e;
            --font-heading: 'Cormorant Garamond', ui-serif, Georgia, serif;
            --font-body: ui-serif, Georgia, 'Times New Roman', serif;
            --portal-bg: #1a0b2e;
            --particle-color: rgba(138, 43, 226, 0.6);
            --menu-accent: #C5A059;
        }

        .theme-mt {
            --bg-color: #08120a;
            --surface: #112415;
            --border: #2b4f35;
            --primary: #32cd32;
            --primary-glow: rgba(50, 205, 50, 0.4);
            --text-main: #c5d9c7;
            --text-muted: #8c9e8e;
            --font-heading: 'Abril Fatface', ui-sans-serif, system-ui, sans-serif;
            --font-body: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --portal-bg: #0b2e1a;
            --particle-color: rgba(50, 205, 50, 0.6);
            --menu-accent: #50C878;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            transition: color 0.5s ease;
        }

        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.6s ease, opacity 0.6s ease;
        }

        #bg-scrim {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(0, 0, 0, 0.38);
            pointer-events: none;
            transition: background 0.5s ease;
        }

        .theme-lom #bg-scrim {
            background: linear-gradient(180deg, rgba(13, 8, 18, 0.55) 0%, rgba(0, 0, 0, 0.35) 45%, rgba(0, 0, 0, 0.5) 100%);
        }

        .theme-mt #bg-scrim {
            background: linear-gradient(180deg, rgba(8, 18, 10, 0.55) 0%, rgba(0, 0, 0, 0.35) 45%, rgba(0, 0, 0, 0.5) 100%);
        }
	.app-wrapper {
	    max-width: 720px;
	    margin: 0 auto;
	    width: 100%;
	    height: 100dvh;
	    display: flex;
	    flex-direction: column;
	    position: relative;
	    z-index: 1;
	    box-shadow: 0 0 80px rgba(0,0,0,0.4);
	}

        .app-header {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            flex-wrap: nowrap;
        }

        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--menu-accent);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }

        .desktop-meta {
            flex-shrink: 0;
        }

        .toggle-group.compact .toggle-btn {
            padding: 6px 10px;
            font-size: 0.72rem;
            min-height: 34px;
        }

        .app-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--primary);
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .menu-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
            transform: scale(1.05);
        }

        .toggle-group {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px;
            gap: 4px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.8rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px var(--primary-glow);
        }

        .msg-ai {
            align-self: flex-start;
            background: color-mix(in srgb, var(--surface) 78%, transparent);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .msg-user p, .msg-ai p {
            padding: 12px 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .typing-indicator span {
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            position: relative;
            z-index: 100;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 8px;
            scrollbar-width: none;
        }

        .suggestions::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .chip:hover {
            border-color: var(--primary);
            background: rgba(138, 43, 226, 0.1);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 24px;
            font-family: var(--font-body);
            font-size: 16px; /* Prevents iOS zoom */
            outline: none;
        }

        .input-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-size: 1rem;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* Side Menu */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-right: 2px solid var(--menu-accent);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .side-menu.active {
            transform: translateX(0);
        }

        .menu-header {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--menu-accent);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .menu-link {
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            cursor: pointer;
        }

        .menu-link:hover {
            border-color: var(--menu-accent);
            background: rgba(0, 0, 0, 0.5);
            transform: translateX(4px);
        }

        .menu-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Parallax & Particles & Overlays */
        .parallax-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .parallax-layer {
            position: absolute;
            inset: -50px;
            transform: translate3d(var(--px), var(--py), 0);
            transition: transform 0.2s ease-out, opacity 0.5s ease;
            opacity: 0;
        }

        .theme-lom .lom-bg { opacity: 1; }
        .theme-mt .mt-bg { opacity: 1; }

        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--particle-color);
            animation: float-up linear infinite;
            opacity: 0;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        #portal-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            background: var(--portal-bg);
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #portal-overlay.active {
            clip-path: circle(150% at 50% 50%);
        }

        .theme-lom::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 9998;
            mix-blend-mode: overlay;
        }

        .theme-mt::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            font-size: 0.72rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 98;
        }

        .warmth-dots { display: flex; gap: 4px; }
        .warmth-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--border);
            transition: background 0.3s;
        }
        .warmth-dot.active { background: var(--menu-accent); box-shadow: 0 0 6px var(--menu-accent); }

        .progress-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 97;
        }
        .progress-bar label { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
        .progress-bar select {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: var(--font-body);
        }

        .msg-ai .persona-label {
            font-size: 0.7rem;
            color: var(--menu-accent);
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .msg-style-nighthawk { border-left: 3px solid var(--menu-accent); }
        .msg-style-tarot { border: 1px solid var(--menu-accent); border-radius: 4px 18px 18px 18px; }
        .msg-style-guild { border-left: 3px solid var(--primary); font-family: var(--font-body); }
        .msg-style-journal { border-left: 3px solid var(--menu-accent); font-style: italic; }

        .msg-receipts, .msg-skipped {
            margin-top: 10px;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }
        .msg-receipts summary, .msg-skipped summary { cursor: pointer; color: var(--menu-accent); }
        .msg-receipts ul { margin-top: 6px; padding-left: 18px; }

        .msg-veil {
            border: 1px solid var(--menu-accent) !important;
            animation: veil-shake 0.5s ease;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .msg-actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .share-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--menu-accent);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .share-btn:hover { border-color: var(--menu-accent); background: rgba(0,0,0,0.2); }
        .share-btn-primary {
            border-color: var(--primary);
            color: #fff;
            background: color-mix(in srgb, var(--primary) 35%, transparent);
        }
        .share-btn-primary:hover { background: color-mix(in srgb, var(--primary) 55%, transparent); }
        .share-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            padding: 4px 16px 0;
            opacity: 0.85;
        }

        .spoiler-veil-active #bg-scrim {
            animation: fog-roll 2.5s ease;
        }
        @keyframes fog-roll {
            0%, 100% { filter: blur(0); }
            50% { filter: blur(8px) brightness(0.4); }
        }
        @keyframes veil-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .egg-pulse { animation: egg-pulse 1s ease; }
        @keyframes egg-pulse {
            50% { filter: brightness(1.3); }
        }

        .about-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 10001;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .about-overlay.active { display: flex; }
        .about-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 420px;
            max-height: 80dvh;
            overflow-y: auto;
        }
        .about-modal h2 { font-family: var(--font-heading); color: var(--primary); margin-bottom: 12px; }
        .about-modal p { margin-bottom: 12px; line-height: 1.5; font-size: 0.9rem; }
        .about-modal ul { margin: 8px 0 12px 18px; font-size: 0.85rem; }
        .about-modal button {
            margin-top: 12px;
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .faq-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 10002;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .faq-overlay.active { display: flex; }
        .faq-sheet {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 720px;
            max-height: 75dvh;
            overflow-y: auto;
            padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
        }
        .faq-sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .faq-sheet-header h3 {
            font-family: var(--font-heading);
            color: var(--primary);
            font-size: 1rem;
        }
        .faq-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .faq-category { margin-bottom: 14px; }
        .faq-category h4 {
            font-size: 0.8rem;
            color: var(--menu-accent);
            margin-bottom: 8px;
        }
        .faq-item {
            display: block;
            width: 100%;
            text-align: left;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: var(--font-body);
        }
        .faq-item:active { border-color: var(--primary); }

        .msg-ref-image {
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .msg-ref-image img {
            width: 100%;
            display: block;
            max-height: 220px;
            object-fit: cover;
        }
        .msg-ref-image figcaption {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 6px 10px;
            background: rgba(0,0,0,0.3);
        }

        .suggestions-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .faq-chip-btn {
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--menu-accent);
            color: var(--menu-accent);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            cursor: pointer;
            white-space: nowrap;
        }

        /* ─── Mobile: premium chat layout ─── */
        @media (max-width: 640px) {
            body {
                padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            }

            #bg-layer {
                background-attachment: scroll;
            }

            .app-wrapper {
                max-width: 100%;
                box-shadow: none;
            }

            .app-header {
                padding: 8px 10px;
                gap: 6px;
            }

            .app-title {
                font-size: 0.95rem;
                max-width: 28vw;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .header-controls { gap: 4px; }

            .toggle-group.compact .toggle-btn {
                padding: 8px 7px;
                font-size: 0.68rem;
                min-height: 36px;
            }

            .menu-btn, .icon-btn {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }

            .desktop-meta {
                display: none;
            }

            .chat-container {
                padding: 12px 10px;
                gap: 10px;
                -webkit-overflow-scrolling: touch;
            }

    <script type="module">
        import { siteConfig } from './config.js';
        import {
            loadSession, saveSession, loadProgress, saveProgress,
            getNickname, trimHistory, parseMetadata, checkEasterEgg,
            playUniverseSound, triggerSpoilerVeil, triggerEggEffect,
            shareOracleTake, downloadBlob, generateShareCard, buildXIntentUrl,
            getMessageStyleClass, getPersonaLabel
        } from './immersion.js';

        let currentUniverse = 'lom';
        let currentAudience = 'watcher';
        let isGenerating = false;
        let session = loadSession('lom', 'watcher');

        window.siteConfig = siteConfig;

        function applyUiFromConfig() {
            const ui = siteConfig.ui || {};
            const el = (id, text) => { const n = document.getElementById(id); if (n && text) n.textContent = text; };
            el('app-title', ui.appTitle);
            el('progress-label', ui.progressLabel);
            el('progress-summary', `📍 ${ui.progressLabel || 'Your progress'}`);
            el('share-hint', ui.shareHint);
            el('menu-footer', ui.menuFooter);
            el('faq-title', ui.faqTitle);
            el('faq-chip-btn', ui.faqButton);
            const sendBtn = document.querySelector('.send-btn');
            if (sendBtn && ui.sendButton) sendBtn.textContent = ui.sendButton;
            const editLink = document.getElementById('edit-config-link');
            if (editLink && siteConfig.personal?.configEditUrl) {
                editLink.href = siteConfig.personal.configEditUrl;
            }
        }

        function updateWarmthUI() {
            const dots = document.getElementById('warmth-dots');
            if (!dots) return;
            const max = 12;
            dots.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const d = document.createElement('span');
                d.className = 'warmth-dot' + (session.warmth >= (i + 1) * 2 ? ' active' : '');
                dots.appendChild(d);
            }
        }

        function updateModeStatus() {
            const el = document.getElementById('mode-status');
            const cfg = siteConfig[currentUniverse]?.[currentAudience];
            if (el && cfg) el.textContent = cfg.modeStatus || '';
        }

        function populateProgressSelect() {
            const selects = [
                document.getElementById('progress-select'),
                document.getElementById('progress-select-menu')
            ].filter(Boolean);
            if (!selects.length) return;

            const options = siteConfig[currentUniverse]?.progressOptions?.[currentAudience] || [];
            const saved = loadProgress(currentUniverse, currentAudience);
            const placeholder = siteConfig.ui?.progressPlaceholder || '— Set your progress —';

            selects.forEach((sel) => {
                sel.innerHTML = `<option value="">${placeholder}</option>`;
                options.forEach((opt) => {
                    const o = document.createElement('option');
                    o.value = opt;
                    o.textContent = opt;
                    if (opt === saved) o.selected = true;
                    sel.appendChild(o);
                });
            });
        }

        function renderFaqSheet() {
            const container = document.getElementById('faq-content');
            if (!container) return;
            const faq = siteConfig[currentUniverse]?.[currentAudience]?.faq || [];
            container.innerHTML = '';

            faq.forEach((cat) => {
                const section = document.createElement('div');
                section.className = 'faq-category';
                section.innerHTML = `<h4>${cat.category}</h4>`;
                cat.items.forEach((q) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'faq-item';
                    btn.textContent = q;
                    btn.onclick = () => {
                        document.getElementById('faq-overlay')?.classList.remove('active');
                        document.getElementById('user-input').value = q;
                        document.getElementById('chat-form').dispatchEvent(new Event('submit'));
                    };
                    section.appendChild(btn);
                });
                container.appendChild(section);
            });

            if (!faq.length) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No FAQ loaded — edit config.js</p>';
            }
        }

        function openFaq() {
            renderFaqSheet();
            document.getElementById('faq-overlay')?.classList.add('active');
        }

        function getProgressStamp() {
            const sel = document.getElementById('progress-select');
            return sel?.value || loadProgress(currentUniverse, currentAudience) || '';
        }

        function buildAiMessageHtml(text, meta = {}) {
            const styleClass = getMessageStyleClass(currentUniverse, currentAudience, siteConfig);
            const persona = getPersonaLabel(currentUniverse, currentAudience, siteConfig);
            const isVeil = !!meta.veil;
            const displayText = meta.veil || text;

            let html = `<div class="persona-label">${persona}</div>`;
            html += `<p style="white-space: pre-wrap;">${formatText(displayText)}</p>`;

            if (meta.skipped) {
                html += `<details class="msg-skipped"><summary>📺 Anime skipped this</summary><p>${formatText(meta.skipped)}</p></details>`;
            }
            if (meta.receipts?.length) {
                html += `<details class="msg-receipts"><summary>📜 Fan receipts</summary><ul>`;
                meta.receipts.forEach((r) => { html += `<li>${formatText(r)}</li>`; });
                html += `</ul></details>`;
            }
            if (meta.image?.url) {
                html += `<figure class="msg-ref-image"><img src="${meta.image.url}" alt="${formatText(meta.image.caption)}" loading="lazy" /><figcaption>${formatText(meta.image.caption)} · Wikimedia reference</figcaption></figure>`;
            }
            if (text.length > 50 && !isVeil) {
                const enc = encodeURIComponent(text.slice(0, 400));
                html += `<div class="msg-actions">
                    <button type="button" class="share-btn share-btn-download" data-share="${enc}">⬇️ Download card</button>
                    <button type="button" class="share-btn share-btn-primary share-btn-x" data-share="${enc}">𝕏 Share on X</button>
                </div>`;
            }

            return { html, styleClass: styleClass + (isVeil ? ' msg-veil' : '') };
        }

        async function handleShareAction(text, mode, btn) {
            if (btn) { btn.disabled = true; btn.textContent = 'Creating card…'; }
            try {
                if (mode === 'download') {
                    const blob = await generateShareCard({
                        text, universe: currentUniverse, audience: currentAudience, siteConfig
                    });
                    const prefix = currentUniverse === 'lom' ? 'lom' : 'mt';
                    downloadBlob(blob, `lore-bridge-${prefix}-take.png`);
                } else {
                    await shareOracleTake({
                        text, universe: currentUniverse, audience: currentAudience, siteConfig
                    });
                }
            } catch (err) {
                alert('Could not create share card. Try again.');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = mode === 'download' ? '⬇️ Download card' : '𝕏 Share on X';
                }
            }
        }

        function attachShareHandlers(container) {
            container.querySelectorAll('.share-btn-download').forEach((btn) => {
                btn.onclick = () => handleShareAction(decodeURIComponent(btn.dataset.share || ''), 'download', btn);
            });
            container.querySelectorAll('.share-btn-x').forEach((btn) => {
                btn.onclick = () => handleShareAction(decodeURIComponent(btn.dataset.share || ''), 'x', btn);
            });
        }

        function renderAiMessage(aiId, rawText) {
            const meta = parseMetadata(rawText);
            const { html, styleClass } = buildAiMessageHtml(meta.text, meta);
            const el = document.getElementById(aiId);
            if (!el) return meta;

            el.className = `msg-ai ${styleClass}`;
            el.innerHTML = html;
            attachShareHandlers(el);

            if (meta.veil) triggerSpoilerVeil();
            scrollToBottom();
            return meta;
        }

        function applyBackground(series) {
            if (!window.siteConfig) return;
            const bgLayer = document.getElementById('bg-layer');

            const bg = window.siteConfig[series]?.backgroundImage || window.siteConfig[series]?.images?.background;
            if (bg) {
                bgLayer.style.backgroundImage = `url('${bg}')`;
                bgLayer.style.opacity = '1';
            } else {
                bgLayer.style.backgroundImage = 'none';
                bgLayer.style.opacity = '0';
            }
        }

        function resetChatForCurrentMode() {
            session = loadSession(currentUniverse, currentAudience);
            const config = siteConfig[currentUniverse];
            if (!config) return;
            const modeConfig = config[currentAudience];
            if (!modeConfig) return;

            updateModeStatus();
            updateWarmthUI();
            populateProgressSelect();

            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '';

            if (session.history.length > 0) {
                session.history.forEach((turn) => {
                    const div = document.createElement('div');
                    if (turn.role === 'user') {
                        div.className = 'msg-user';
                        div.style.maxWidth = '90%';
                        div.style.width = '90%';
                        div.innerHTML = `<p>${turn.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>`;
                    } else {
                        const parsed = parseMetadata(turn.content);
                        const { html, styleClass } = buildAiMessageHtml(parsed.text, parsed);
                        div.className = `msg-ai ${styleClass}`;
                        div.style.maxWidth = '95%';
                        div.style.width = '95%';
                        div.innerHTML = html;
                    }
                    chatContainer.appendChild(div);
                });
                attachShareHandlers(chatContainer);
            } else {
                const welcomeDiv = document.createElement('div');
                const styleClass = getMessageStyleClass(currentUniverse, currentAudience, siteConfig);
                welcomeDiv.className = `msg-ai ${styleClass}`;

                welcomeDiv.style.width = '95%';
                welcomeDiv.innerHTML = `<div class="persona-label">${getPersonaLabel(currentUniverse, currentAudience, siteConfig)}</div><p>${modeConfig.welcomeMessage}</p>`;
                chatContainer.appendChild(welcomeDiv);
            }
            
            // 3. Update suggestion chips
            const suggestionsContainer = document.getElementById('suggestions');
            suggestionsContainer.innerHTML = '';
            const quick = (modeConfig.suggestions || []).slice(0, 2);
            quick.forEach(suggestion => {
                const chip = document.createElement('button');

                chip.textContent = suggestion;
                chip.onclick = () => {
                    document.getElementById('user-input').value = suggestion;

                suggestionsContainer.appendChild(chip);

            // 4. Update input placeholder
            document.getElementById('user-input').placeholder = modeConfig.inputPlaceholder;
            
            // 5. Update diegetic side menu text
            updateMenuText();
        }

        function updateMenuText() {
            const uni = siteConfig[currentUniverse] || {};
            document.getElementById('menu-toggle').textContent = currentUniverse === 'lom' ? '🃏' : '🗡️';
            document.getElementById('menu-header').textContent = uni.menuHeader || (currentUniverse === 'lom' ? 'The Gray Fog' : "The Adventurer's Guild");
            document.getElementById('support-link').textContent = uni.supportLinkText || uni.diegeticText?.buttonText || 'Support';
            
            if (siteConfig.personal) {
                document.getElementById('github-link').href = siteConfig.personal.github || '#';
                document.getElementById('support-link').href = siteConfig.personal.paymentMethods?.buyMeACoffee || '#';
            }
        }

        function switchUniverse(newUniverse) {
            if (newUniverse === currentUniverse) return;

            const portal = document.getElementById('portal-overlay');
            const body = document.body;

            portal.classList.add('active');
            playUniverseSound(newUniverse);

            setTimeout(() => {
                body.classList.remove('theme-lom', 'theme-mt');
                body.classList.add(`theme-${newUniverse}`);
                currentUniverse = newUniverse;

                resetChatForCurrentMode();
                generateParticles();
                applyBackground(newUniverse);

            setTimeout(() => {
                portal.classList.remove('active');
            }, 800);
        }

        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;

            document.documentElement.style.setProperty('--py', `${y}px`);
        });

        function generateParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            const count = window.matchMedia('(max-width: 640px)').matches ? 6 : 15;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${15 + Math.random() * 25}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;

                container.appendChild(p);

        // Event Listeners for Toggles
        document.querySelectorAll('#universe-toggle .toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#universe-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

        document.querySelectorAll('#audience-toggle .toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#audience-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentAudience = btn.dataset.audience;
                
                // Reset chat and UI for the new audience mode
                resetChatForCurrentMode();

        });

        // Side Menu Logic
        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        const sideMenu = document.getElementById('side-menu');

        menuToggle.addEventListener('click', () => {
            menuOverlay.classList.add('active');
            sideMenu.classList.add('active');
        });

        menuOverlay.addEventListener('click', () => {
            menuOverlay.classList.remove('active');
            sideMenu.classList.remove('active');
        });

        // Chat Logic
        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            if(container) container.scrollTop = container.scrollHeight;
        }

        function formatText(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--menu-accent);">$1</strong>');
        }

        function getApiUrl() {
            if (window.location.protocol === 'file:') {
                throw new Error('Open https://lore-bridge.vercel.app instead of the local HTML file.');
            }
            return `${window.location.origin}/api/chat`;
        }

        function prefersBufferedChat() {
            // Firefox mishandles fetch() + ReadableStream SSE on all platforms.
            return /Firefox|FxiOS/i.test(navigator.userAgent);
        }

        function updateAiMessage(aiId, text) {
            renderAiMessage(aiId, text);
        }

        let streamRawBuffer = '';

        function parseSseLines(buffer, onChunk) {
            const lines = buffer.split('\n');
            const remainder = lines.pop() || '';

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6).trim();
                if (!data || data === '[DONE]') continue;

                try {
                    const parsed = JSON.parse(data);
                    if (parsed.content) onChunk(parsed.content);
                    if (parsed.error) throw new Error(parsed.error);
                } catch (err) {
                    if (err.message && err.message !== 'Unexpected end of JSON input') throw err;
                }
            }

            return remainder;
        }

        async function streamChat(apiUrl, payload, aiId) {
            streamRawBuffer = '';
            const res = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
                body: JSON.stringify({ ...payload, stream: true })
            });

            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || `API request failed (${res.status})`);
            }

            if (!res.body || typeof res.body.getReader !== 'function') {
                const text = await res.text();
                let aiResponse = '';
                parseSseLines(text + '\n', (chunk) => { aiResponse += chunk; });
                updateAiMessage(aiId, aiResponse || 'No response received.');
                return aiResponse;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let aiResponse = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                buffer = parseSseLines(buffer, (chunk) => {
                    aiResponse += chunk;
                    streamRawBuffer = aiResponse;
                    updateAiMessage(aiId, aiResponse);
                });
            }

            if (buffer.trim()) {
                parseSseLines(buffer + '\n', (chunk) => {
                    aiResponse += chunk;
                    streamRawBuffer = aiResponse;
                    updateAiMessage(aiId, aiResponse);
                });
            }
            return streamRawBuffer || aiResponse;
        }

        async function bufferedChat(apiUrl, payload, aiId) {
            const res = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ ...payload, stream: false })
            });

            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.error || `API request failed (${res.status})`);
            }

            const content = data.content || 'No response received.';
            updateAiMessage(aiId, content);
            return content;
        }

        async function handleSend(e) {
            e.preventDefault();
            if (isGenerating) return;
            
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            const egg = checkEasterEgg(msg, siteConfig, currentUniverse);
            if (egg && !session.eggs?.includes(egg.phrase)) {
                session.eggs = session.eggs || [];
                session.eggs.push(egg.phrase);
                triggerEggEffect(egg.effect);
            }

            isGenerating = true;
            input.value = '';
            
            const chatContainer = document.getElementById('chat-container');
            
            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'msg-user';
            userDiv.style.maxWidth = '90%';
            userDiv.style.width = '90%';
            userDiv.innerHTML = `<p>${msg.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>`;
            chatContainer.appendChild(userDiv);
            
            // AI Placeholder
            const aiId = 'msg-' + Date.now();
            const aiDiv = document.createElement('div');
            aiDiv.id = aiId;
            aiDiv.className = 'msg-ai';
            aiDiv.style.maxWidth = '95%';
            aiDiv.style.width = '95%';
            aiDiv.innerHTML = `
                <p>
                    <div class="typing-indicator" style="display: flex; gap: 4px;">
                        <span style="width: 8px; height: 8px; background: var(--menu-accent); border-radius: 50%; display: inline-block;"></span>
                        <span style="width: 8px; height: 8px; background: var(--menu-accent); border-radius: 50%; display: inline-block;"></span>
                        <span style="width: 8px; height: 8px; background: var(--menu-accent); border-radius: 50%; display: inline-block;"></span>
                    </div>
                </p>`;
            chatContainer.appendChild(aiDiv);
            scrollToBottom();

            const engineSelect = document.getElementById('engine-select');
            const [selProvider, selModel] = (engineSelect?.value || 'xai:grok-3-mini').split(':');

            const payload = {
                message: msg,
                series: currentUniverse,
                audience: currentAudience,
                progress: getProgressStamp(),
                warmth: session.warmth,
                nickname: getNickname(siteConfig, session.warmth),
                history: session.history,
                provider: selProvider,
                model: selModel
            };

            let fullResponse = '';

            try {
                const apiUrl = getApiUrl();

                if (prefersBufferedChat()) {
                    fullResponse = await bufferedChat(apiUrl, payload, aiId);
                } else {
                    try {
                        fullResponse = await streamChat(apiUrl, payload, aiId);
                    } catch (streamErr) {
                        console.warn('Streaming failed, retrying without stream:', streamErr);
                        fullResponse = await bufferedChat(apiUrl, payload, aiId);
                    }
                }

                renderAiMessage(aiId, fullResponse);
                session.history.push({ role: 'user', content: msg });
                session.history.push({ role: 'assistant', content: fullResponse });
                session.history = trimHistory(session.history, siteConfig.memory?.maxHistoryTurns || 8);
                session.warmth += siteConfig.memory?.warmthPerMessage || 1;
                saveSession(currentUniverse, currentAudience, session);
                updateWarmthUI();
            } catch (err) {
                const currentAiDiv = document.getElementById(aiId);
                if (currentAiDiv) {
                    currentAiDiv.innerHTML = `<p style="color: #ff6b6b;">Error: ${err.message}</p>`;
                }
            }

            isGenerating = false;
        }

        document.getElementById('chat-form').addEventListener('submit', handleSend);

        function onProgressChange(value) {
            saveProgress(currentUniverse, currentAudience, value);
            const sel = document.getElementById('progress-select');
            const menuSel = document.getElementById('progress-select-menu');
            if (sel) sel.value = value;
            if (menuSel) menuSel.value = value;
        }

        document.getElementById('progress-select')?.addEventListener('change', (e) => onProgressChange(e.target.value));
        document.getElementById('progress-select-menu')?.addEventListener('change', (e) => onProgressChange(e.target.value));

        document.getElementById('faq-btn')?.addEventListener('click', openFaq);
        document.getElementById('faq-chip-btn')?.addEventListener('click', openFaq);
        document.getElementById('faq-close')?.addEventListener('click', () => {
            document.getElementById('faq-overlay')?.classList.remove('active');
        });
        document.getElementById('faq-overlay')?.addEventListener('click', (e) => {
            if (e.target.id === 'faq-overlay') e.target.classList.remove('active');
        });

        document.getElementById('share-app-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            const url = siteConfig.share?.siteUrl || siteConfig.personal?.siteUrl;
            const text = siteConfig.share?.appTweet || 'Spoiler-safe AI lore chat for LoM & Mushoku Tensei';
            const tags = (siteConfig.share?.hashtags || '').replace(/#/g, '').trim();
            window.open(buildXIntentUrl({ text, url, hashtags: tags }), '_blank', 'noopener');
            menuOverlay.classList.remove('active');
            sideMenu.classList.remove('active');
        });

        const aboutOverlay = document.getElementById('about-overlay');
        const aboutModal = document.getElementById('about-modal');

        window.showAbout = function() {
            const a = siteConfig.about;
            aboutModal.innerHTML = `
                <h2>${a.title}</h2>
                <p>${a.description}</p>
                <p><strong>Features</strong></p><ul>${a.features.map((f) => `<li>${f}</li>`).join('')}</ul>
                <p><strong>Tech</strong></p><ul>${a.techStack.map((t) => `<li>${t}</li>`).join('')}</ul>
                <p style="font-size:0.8rem;color:var(--text-muted)">Memory uses your browser only (sessionStorage + localStorage). No account. Clears when you close the tab — except your progress stamp.</p>
                <p style="font-size:0.8rem;color:var(--menu-accent)">${siteConfig.about?.editNote || ''}</p>
                <button type="button" id="about-close">Close</button>`;
            aboutOverlay.classList.add('active');
            document.getElementById('about-close').onclick = () => aboutOverlay.classList.remove('active');
            menuOverlay.classList.remove('active');
            sideMenu.classList.remove('active');
        };
        aboutOverlay?.addEventListener('click', (e) => {
            if (e.target === aboutOverlay) aboutOverlay.classList.remove('active');
        });

        applyUiFromConfig();
        generateParticles();
        resetChatForCurrentMode();
        applyBackground('lom');

        renderFaqSheet();
    </script>
</body>
</html>
