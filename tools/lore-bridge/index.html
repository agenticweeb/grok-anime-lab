<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lore Bridge • Immersive Fandom Hub</title>
    
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Abril+Fatface&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CORE VARIABLES & THEMES
           ========================================= */
        :root {
            --px: 0px;
            --py: 0px;
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* APP SHELL - Mobile First */
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden; /* NO PAGE SCROLL */
            height: 100dvh; /* Dynamic viewport height */
            display: flex;
            flex-direction: column;
        }

        /* Lord of the Mysteries (LoM) Theme */
        .theme-lom {
            --bg-color: #0d0812;
            --surface: #1a1124;
            --border: #3d2b4f;
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --text-main: #d4c5d9;
            --text-muted: #9a8c9e;
            --font-heading: 'Cormorant Garamond', ui-serif, Georgia, serif;
            --font-body: ui-serif, Georgia, 'Times New Roman', serif;
            --portal-bg: #1a0b2e;
            --particle-color: rgba(138, 43, 226, 0.6);
            --menu-border: #c5a059;
            --menu-title: "The Gray Fog";
        }

        /* Mushoku Tensei (MT) Theme */
        .theme-mt {
            --bg-color: #08120a;
            --surface: #112415;
            --border: #2b4f35;
            --primary: #32cd32;
            --primary-glow: rgba(50, 205, 50, 0.4);
            --text-main: #c5d9c7;
            --text-muted: #8c9e8e;
            --font-heading: 'Abril Fatface', ui-sans-serif, system-ui, sans-serif;
            --font-body: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --portal-bg: #0b2e1a;
            --particle-color: rgba(50, 205, 50, 0.6);
            --menu-border: #32cd32;
            --menu-title: "The Adventurer's Guild";
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* 4K Background Images */
        body {
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
        }

        /* Dark overlay so text is readable over 4K images */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
            pointer-events: none;
        }

        /* =========================================
           2. TOP BAR (Sticky Header)
           ========================================= */
        .top-bar {
            position: relative;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .toggle-group {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 3px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.85rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .menu-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* =========================================
           3. CHAT AREA (The Core)
           ========================================= */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 10;
        }

        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            justify-content: flex-end;
        }

        .msg-ai {
            justify-content: flex-start;
        }

        .chat-bubble {
            padding: 14px 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-user .chat-bubble {
            background: var(--primary);
            color: #fff;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .msg-ai .chat-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* =========================================
           4. INPUT AREA (Sticky Bottom)
           ========================================= */
        .input-area {
            position: relative;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
            scrollbar-width: none;
        }

        .suggestions::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .chip:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 30px;
            font-family: var(--font-body);
            font-size: 16px; /* Prevents iOS zoom */
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-size: 1rem;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* =========================================
           5. DIEGETIC SIDE MENU
           ========================================= */
        .side-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .side-menu-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            max-width: 85vw;
            height: 100dvh;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-right: 2px solid var(--menu-border);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 24px;
            overflow-y: auto;
        }

        .side-menu.active {
            transform: translateX(0);
        }

        .menu-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 24px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .menu-link:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            transform: translateX(4px);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .menu-link-icon {
            font-size: 1.3rem;
        }

        .menu-footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* =========================================
           6. MODALS
           ========================================= */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90dvh;
            overflow-y: auto;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .modal-title {
            font-family: var(--font-heading);
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .modal-description {
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-main);
        }

        .payment-option:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateX(4px);
        }

        .payment-icon {
            font-size: 1.3rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-body);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
        }

        /* =========================================
           7. ATMOSPHERIC EFFECTS
           ========================================= */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--particle-color);
            animation: float-up linear infinite;
            opacity: 0;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        /* The "Wow" Factor Overlays */
        .theme-lom::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.02) 0px,
                rgba(255, 255, 255, 0.02) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9998;
            mix-blend-mode: overlay;
        }

        .theme-mt::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
        }

        /* Portal Transition */
        #portal-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            background: var(--portal-bg);
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #portal-overlay.active {
            clip-path: circle(150% at 50% 50%);
        }

        /* About Modal Content */
        .about-content h2 {
            color: var(--primary);
            margin: 20px 0 12px 0;
            font-size: 1.3rem;
        }

        .about-content ul {
            list-style: none;
            padding: 0;
        }

        .about-content li {
            padding: 10px 14px;
            background: var(--bg-color);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="theme-lom">

    <!-- Portal Overlay -->
    <div id="portal-overlay"></div>

    <!-- Particles -->
    <div class="particles-container" id="particles"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="toggle-group" id="universe-toggle">
            <button class="toggle-btn active" data-universe="lom">🃏 LoM</button>
            <button class="toggle-btn" data-universe="mt">🗡️ MT</button>
        </div>
        <button class="menu-btn" id="menu-btn">🃏</button>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chat-area">
        <div class="message msg-ai">
            <div class="chat-bubble" style="max-width: 95%; width: 95%;">
                <p class="text-sm leading-relaxed">Hey! Ask me anything about the lore.</p>
            </div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <div class="suggestions" id="suggestions">
            <button class="chip">Who is The Fool?</button>
            <button class="chip">Explain the Pathways</button>
            <button class="chip">Mystery of the Gray Fog</button>
        </div>
        <div class="input-row">
            <input type="text" id="user-input" placeholder="Consult the Oracle..." />
            <button class="send-btn" id="send-btn">Send</button>
        </div>
    </div>

    <!-- SIDE MENU OVERLAY -->
    <div class="side-menu-overlay" id="menu-overlay"></div>

    <!-- SIDE MENU -->
    <div class="side-menu" id="side-menu">
        <h2 class="menu-title" id="menu-title">The Gray Fog</h2>
        <div class="menu-links">
            <a href="#" class="menu-link" onclick="openAboutModal(); return false;">
                <span class="menu-link-icon">📜</span>
                <span>About the Oracle</span>
            </a>
            <a href="#" class="menu-link" id="github-link" target="_blank">
                <span class="menu-link-icon">💻</span>
                <span>View the Source Code</span>
            </a>
            <a href="#" class="menu-link" onclick="openPaymentModal(); return false;">
                <span class="menu-link-icon">☕</span>
                <span id="menu-donate-text">Offer a Sacrifice</span>
            </a>
            <a href="mailto:angazadesk@zohomail.com?subject=Lore Bridge Feedback" class="menu-link">
                <span class="menu-link-icon">🐛</span>
                <span id="menu-feedback-text">Report an Anomaly</span>
            </a>
        </div>
        <div class="menu-footer">
            Built with @grok
        </div>
    </div>

    <!-- ABOUT MODAL -->
    <div id="about-modal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">About Lore Bridge</h3>
            <div class="about-content" id="about-content">
                <!-- Populated by JS -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('about-modal')">Close</button>
            </div>
        </div>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="payment-modal-title">Support the Bridge</h3>
            <p class="modal-description" id="payment-modal-description">
                Your offering strengthens the veil between worlds.
            </p>
            <div class="payment-options" id="payment-options">
                <!-- Populated by JS -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('payment-modal')">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import config
        import { siteConfig } from './config.js';

        // =========================================
        // STATE MANAGEMENT
        // =========================================
        let currentUniverse = 'lom';
        let currentAudience = 'watcher';
        let isGenerating = false;

        window.siteConfig = siteConfig;

        // =========================================
        // BACKGROUND IMAGES
        // =========================================
        function applyBackground(series) {
            if (!window.siteConfig) return;
            const bg = window.siteConfig[series]?.backgroundImage;
            if (bg) {
                document.body.style.backgroundImage = `url('${bg}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundAttachment = 'fixed';
            }
        }

        // =========================================
        // PARTICLES
        // =========================================
        function generateParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${15 + Math.random() * 25}s`;
                p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.width = p.style.height = `${2 + Math.random() * 4}px`;
                container.appendChild(p);
            }
        }

        // =========================================
        // UNIVERSE SWITCHING
        // =========================================
        function switchUniverse(newUniverse) {
            if (newUniverse === currentUniverse) return;
            
            const portal = document.getElementById('portal-overlay');
            const body = document.body;
            
            portal.classList.add('active');
            
            setTimeout(() => {
                body.classList.remove('theme-lom', 'theme-mt');
                body.classList.add(`theme-${newUniverse}`);
                currentUniverse = newUniverse;
                updateAllUI();
                generateParticles();
                applyBackground(newUniverse);
            }, 400);
            
            setTimeout(() => {
                portal.classList.remove('active');
            }, 800);
        }

        // =========================================
        // UI UPDATES
        // =========================================
        function updateAllUI() {
            const config = siteConfig[currentUniverse];
            const modeConfig = config[currentAudience];
            
            // Update menu button icon
            const menuBtn = document.getElementById('menu-btn');
            menuBtn.textContent = currentUniverse === 'lom' ? '🃏' : '🗡️';
            
            // Update menu title
            document.getElementById('menu-title').textContent = config.diegeticText.modalTitle;
            
            // Update menu links
            document.getElementById('menu-donate-text').textContent = 
                currentUniverse === 'lom' ? 'Offer a Sacrifice' : 'Buy a Potion';
            document.getElementById('menu-feedback-text').textContent = 
                currentUniverse === 'lom' ? 'Report an Anomaly' : 'Suggest a Quest';
            
            // Update suggestions
            const suggestionsContainer = document.getElementById('suggestions');
            suggestionsContainer.innerHTML = '';
            modeConfig.suggestions.forEach(suggestion => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.textContent = suggestion;
                chip.onclick = () => {
                    document.getElementById('user-input').value = suggestion;
                    sendMessage();
                };
                suggestionsContainer.appendChild(chip);
            });
            
            // Update payment modal
            document.getElementById('payment-modal-title').textContent = config.diegeticText.modalTitle;
            document.getElementById('payment-modal-description').textContent = config.diegeticText.modalDescription;
        }

        // =========================================
        // MENU SYSTEM
        // =========================================
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        document.getElementById('menu-btn').addEventListener('click', toggleMenu);
        document.getElementById('menu-overlay').addEventListener('click', toggleMenu);

        // =========================================
        // CHAT LOGIC
        // =========================================
        async function sendMessage(e) {
            if (e) e.preventDefault();
            if (isGenerating) return;
            
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            isGenerating = true;
            input.value = '';
            
            const chatArea = document.getElementById('chat-area');
            
            // Append User Message with inline styles
            const userDiv = document.createElement('div');
            userDiv.className = 'message msg-user';
            userDiv.innerHTML = `<div class="chat-bubble" style="max-width: 90%; width: 90%; border-radius: 18px 18px 4px 18px;"><p class="text-sm leading-relaxed">${msg.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p></div>`;
            chatArea.appendChild(userDiv);
            
            // Append AI Placeholder with inline styles
            const aiId = 'msg-' + Date.now();
            const aiDiv = document.createElement('div');
            aiDiv.id = aiId;
            aiDiv.className = 'message msg-ai';
            aiDiv.innerHTML = `
                <div class="chat-bubble" style="max-width: 95%; width: 95%; border-radius: 18px 18px 18px 4px;">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>`;
            chatArea.appendChild(aiDiv);
            scrollToBottom();

            const audienceToggle = document.getElementById('audience-toggle');
            const currentAudienceMode = (audienceToggle && audienceToggle.querySelector('.active')?.dataset.audience === 'reader') ? 'reader' : 'watcher';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg, 
                        series: currentUniverse, 
                        audience: currentAudienceMode 
                    })
                });

                if (!res.ok) throw new Error('API request failed');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let aiResponse = '';
                let isFirstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

                    for (const line of lines) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(data);
                            aiResponse += parsed.content;
                            
                            const currentAiDiv = document.getElementById(aiId);
                            if (currentAiDiv) {
                                const bubble = currentAiDiv.querySelector('.chat-bubble');
                                if (isFirstChunk) {
                                    bubble.innerHTML = `<p class="text-sm leading-relaxed whitespace-pre-wrap">${formatText(aiResponse)}</p>`;
                                    isFirstChunk = false;
                                } else {
                                    bubble.querySelector('p').innerHTML = formatText(aiResponse);
                                }
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            } catch (err) {
                const currentAiDiv = document.getElementById(aiId);
                if(currentAiDiv) {
                    currentAiDiv.querySelector('.chat-bubble').innerHTML = `<p class="text-sm" style="color: #ff6b6b;">Connection lost or API limit hit. Try again in a few seconds.</p>`;
                }
            }

            isGenerating = false;
        }

        function formatText(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--primary);">$1</strong>');
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-area');
            if(container) container.scrollTop = container.scrollHeight;
        }

        // =========================================
        // MODALS
        // =========================================
        window.openAboutModal = function() {
            const about = siteConfig.about;
            const content = document.getElementById('about-content');
            content.innerHTML = `
                <p style="margin-bottom: 16px; line-height: 1.6;">${about.description}</p>
                <h2>✨ Features</h2>
                <ul>
                    ${about.features.map(f => `<li>${f}</li>`).join('')}
                </ul>
                <h2>🛠️ Built With</h2>
                <ul>
                    ${about.techStack.map(t => `<li>${t}</li>`).join('')}
                </ul>
            `;
            document.getElementById('about-modal').classList.add('active');
            toggleMenu();
        };

        window.openPaymentModal = function() {
            const personal = siteConfig.personal;
            const paymentOptions = document.getElementById('payment-options');
            paymentOptions.innerHTML = '';
            
            if (personal.paymentMethods.buyMeACoffee) {
                paymentOptions.appendChild(createPaymentOption('☕', 'Buy Me a Coffee', personal.paymentMethods.buyMeACoffee));
            }
            if (personal.paymentMethods.kofi) {
                paymentOptions.appendChild(createPaymentOption('💜', 'Ko-fi', personal.paymentMethods.kofi));
            }
            if (personal.paymentMethods.paypal) {
                paymentOptions.appendChild(createPaymentOption('💳', 'PayPal', personal.paymentMethods.paypal));
            }
            if (personal.paymentMethods.patreon) {
                paymentOptions.appendChild(createPaymentOption('🎭', 'Patreon', personal.paymentMethods.patreon));
            }
            
            document.getElementById('payment-modal').classList.add('active');
            toggleMenu();
        };

        function createPaymentOption(icon, text, url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.className = 'payment-option';
            a.innerHTML = `
                <span class="payment-icon">${icon}</span>
                <div>
                    <div style="font-weight: 600;">${text}</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">Click to support</div>
                </div>
            `;
            return a;
        }

        window.closeModal = function(modalId) {
            document.getElementById(modalId).classList.remove('active');
        };

        // =========================================
        // EVENT LISTENERS
        // =========================================
        document.querySelectorAll('#universe-toggle .toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#universe-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchUniverse(btn.dataset.universe);
            });
        });

        document.getElementById('send-btn').addEventListener('click', (e) => sendMessage(e));
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage(e);
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Update GitHub link
        if (siteConfig.personal && siteConfig.personal.github) {
            document.getElementById('github-link').href = siteConfig.personal.github;
        }

        // Initialize
        generateParticles();
        updateAllUI();
        applyBackground('lom');
    </script>
</body>
</html>
